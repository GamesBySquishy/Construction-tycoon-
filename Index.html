<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tycoon Game</title>
<style>
  body { background: #0b0f19; color: white; font-family: sans-serif; padding: 20px; }
  .stage-row { 
    background: #1e293b; border: 1px solid #334155; padding: 15px; 
    margin-bottom: 10px; border-radius: 8px; display: flex; align-items: center; gap: 15px; 
  }
  button { padding: 10px; cursor: pointer; background: #22c55e; border: none; color: white; border-radius: 4px; font-weight: bold; }
  button:disabled { background: #475569; cursor: not-allowed; }
</style>
</head>
<body>

  <h1>Assets: $<span id="money">0</span></h1>
  <div id="gameContainer"></div>

  <script>
    const stages = [
      { id: 0, name: 'Permits', cost: 10, revenue: 1 },
      { id: 1, name: 'Excavation', cost: 100, revenue: 10 }
    ];
    let money = 50;

    function render() {
      const container = document.getElementById('gameContainer');
      container.innerHTML = '';
      
      stages.forEach(stage => {
        const div = document.createElement('div');
        div.className = 'stage-row';
        div.innerHTML = `
          <span>${stage.name}</span>
          <button id="btn-${stage.id}">Buy for $${stage.cost}</button>
        `;
        container.appendChild(div);

        // ATTACH EVENT LISTENER DIRECTLY
        const btn = div.querySelector('button');
        btn.onclick = function() {
          console.log("Clicked:", stage.name);
          if (money >= stage.cost) {
            money -= stage.cost;
            alert("Bought " + stage.name);
            update();
          } else {
            alert("Not enough money!");
          }
        };
      });
    }

    function update() {
      document.getElementById('money').innerText = money;
    }

    render();
    update();
  </script>
</body>
</html>
