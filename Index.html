<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construction Tycoon</title>
    <style>
        :root {
            --bg-color: #0a0b10;
            --panel-bg: rgba(20, 23, 31, 0.65);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-money: #22c55e;
            --accent-prestige: #f59e0b;
            --accent-manager: #3b82f6;
            --bar-bg: rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: 80px;
        }

        /* Glassmorphism Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(10, 11, 16, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            z-index: 100;
        }

        .header-stats {
            display: flex;
            gap: 2rem;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .money-display { color: var(--accent-money); }
        .brick-display { color: var(--accent-prestige); }

        button {
            cursor: pointer;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(100%);
        }

        .btn-prestige {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 0.6rem 1.2rem;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.2);
        }
        
        .btn-prestige:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
        }

        /* Main Container */
        main {
            width: 100%;
            max-width: 800px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        /* Glassmorphism Cards */
        .stage-card {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: border-color 0.3s;
        }

        .stage-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Card Header */
        .stage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stage-title {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .stage-qty {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .stage-revenue {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-money);
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 12px;
            background: var(--bar-bg);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-money);
            width: 0%;
            transition: width 0.1s linear;
        }

        .progress-overlay-text {
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
        }

        /* Controls */
        .stage-controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn-action {
            flex: 1;
            padding: 0.8rem;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--panel-border);
        }

        .btn-action:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-buy .cost { color: var(--accent-money); }
        .btn-manager { border-color: rgba(59, 130, 246, 0.3); }
        .btn-manager .cost { color: var(--accent-manager); }
        .btn-manager:hover:not(:disabled) { background: rgba(59, 130, 246, 0.1); border-color: var(--accent-manager); }

        /* Locked State */
        .locked-stage {
            opacity: 0.4;
            filter: grayscale(80%);
            pointer-events: none;
        }

        #offline-toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--accent-money);
            color: #000;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
            transform: translateY(150%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        #offline-toast.show {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <header>
        <div class="header-stats">
            <div class="money-display">Money: <span id="ui-money">$0</span></div>
            <div class="brick-display">Bricks: <span id="ui-bricks">0</span> (<span id="ui-bonus">0</span>%)</div>
        </div>
        <button class="btn-prestige" id="btn-prestige">Prestige (+<span id="ui-prestige-gain">0</span>)</button>
    </header>

    <main id="game-container">
        </main>

    <div id="offline-toast">Offline Earnings: <span id="offline-amount">$0</span></div>

<script>
/**
 * CONSTRUCTION TYCOON - CORE ENGINE
 */

// Formatters
const formatter = new Intl.NumberFormat('en-US', { notation: "compact", compactDisplay: "short", maximumFractionDigits: 2 });
const formatMoney = (val) => '$' + formatter.format(val);

// Data Models
const INITIAL_STAGES = [
    { id: 0, name: "Permits", qty: 1, baseCost: 4, baseRev: 1, duration: 1000, progress: 0, isRunning: false, isManagerHired: false, managerCost: 1000 },
    { id: 1, name: "Excavation", qty: 0, baseCost: 60, baseRev: 60, duration: 3000, progress: 0, isRunning: false, isManagerHired: false, managerCost: 15000 },
    { id: 2, name: "Foundation", qty: 0, baseCost: 720, baseRev: 540, duration: 6000, progress: 0, isRunning: false, isManagerHired: false, managerCost: 100000 },
    { id: 3, name: "Framing", qty: 0, baseCost: 8640, baseRev: 4320, duration: 12000, progress: 0, isRunning: false, isManagerHired: false, managerCost: 500000 },
    { id: 4, name: "Roofing", qty: 0, baseCost: 103680, baseRev: 51840, duration: 24000, progress: 0, isRunning: false, isManagerHired: false, managerCost: 1200000 },
    { id: 5, name: "Finishes", qty: 0, baseCost: 1244160, baseRev: 622080, duration: 96000, progress: 0, isRunning: false, isManagerHired: false, managerCost: 10000000 }
];

const DEFAULT_STATE = {
    money: 0,
    allTimeEarnings: 0,
    bricks: 0,
    allTimeBricks: 0,
    prestigeCount: 0,
    lastSaveTime: Date.now(),
    stages: JSON.parse(JSON.stringify(INITIAL_STAGES))
};

// Application State
let gameState = null;
let lastFrameTime = performance.now();
const DOM = { stages: [] };

// Math Engine
const MathEngine = {
    getCost: (baseCost, qty) => baseCost * Math.pow(1.15, qty),
    getMilestoneMultiplier: (qty) => {
        let mult = 1;
        if (qty >= 25) mult *= 2;
        if (qty >= 50) mult *= 2;
        if (qty >= 100) mult *= 2;
        if (qty >= 250) mult *= 2;
        return mult;
    },
    getRevenue: (stage) => {
        const mult = MathEngine.getMilestoneMultiplier(stage.qty);
        const prestigeBonus = 1 + (gameState.bricks * 0.02); // 2% per brick
        return stage.baseRev * stage.qty * mult * prestigeBonus;
    },
    getPotentialBricks: () => {
        if (gameState.allTimeEarnings < 1000000) return 0;
        return Math.floor(150 * Math.sqrt(gameState.allTimeEarnings / 1000000));
    },
    getBricksToClaim: () => {
        const potential = MathEngine.getPotentialBricks();
        return Math.max(0, potential - gameState.allTimeBricks);
    }
};

// System Functions
const saveGame = () => {
    gameState.lastSaveTime = Date.now();
    localStorage.setItem('constructionTycoonSave', JSON.stringify(gameState));
};

const loadGame = () => {
    const saved = localStorage.getItem('constructionTycoonSave');
    if (saved) {
        try {
            gameState = JSON.parse(saved);
            // Handle schema merges if adding stages later
            if(!gameState.allTimeEarnings) gameState.allTimeEarnings = gameState.money; 
            if(!gameState.allTimeBricks) gameState.allTimeBricks = gameState.bricks;
        } catch (e) {
            gameState = JSON.parse(JSON.stringify(DEFAULT_STATE));
        }
    } else {
        gameState = JSON.parse(JSON.stringify(DEFAULT_STATE));
    }
    processOfflineEarnings();
};

const processOfflineEarnings = () => {
    const now = Date.now();
    const elapsed = Math.max(0, now - gameState.lastSaveTime);
    let offlineGains = 0;

    gameState.stages.forEach(stage => {
        if (stage.qty === 0) return;
        
        if (stage.isManagerHired) {
            const totalTime = elapsed + stage.progress;
            const cycles = Math.floor(totalTime / stage.duration);
            stage.progress = totalTime % stage.duration;
            stage.isRunning = true;
            
            if (cycles > 0) {
                const rev = cycles * MathEngine.getRevenue(stage);
                offlineGains += rev;
            }
        } else if (stage.isRunning) {
            if (stage.progress + elapsed >= stage.duration) {
                offlineGains += MathEngine.getRevenue(stage);
                stage.progress = 0;
                stage.isRunning = false;
            } else {
                stage.progress += elapsed;
            }
        }
    });

    if (offlineGains > 0) {
        gameState.money += offlineGains;
        gameState.allTimeEarnings += offlineGains;
        showOfflineToast(offlineGains);
    }
    saveGame();
};

const prestige = () => {
    const bricksToClaim = MathEngine.getBricksToClaim();
    if (bricksToClaim <= 0) return;

    // Retain prestige data
    const retained = {
        allTimeEarnings: gameState.allTimeEarnings,
        bricks: gameState.bricks + bricksToClaim,
        allTimeBricks: gameState.allTimeBricks + bricksToClaim,
        prestigeCount: gameState.prestigeCount + 1
    };

    // Reset state
    gameState = JSON.parse(JSON.stringify(DEFAULT_STATE));
    Object.assign(gameState, retained);
    saveGame();
    initDOM(); // Rebuild UI to reset states cleanly
};

// DOM Initialization
const initDOM = () => {
    const container = document.getElementById('game-container');
    container.innerHTML = ''; // Clear
    DOM.stages = [];

    // Global UI references
    DOM.uiMoney = document.getElementById('ui-money');
    DOM.uiBricks = document.getElementById('ui-bricks');
    DOM.uiBonus = document.getElementById('ui-bonus');
    DOM.uiPrestigeGain = document.getElementById('ui-prestige-gain');
    DOM.btnPrestige = document.getElementById('btn-prestige');

    DOM.btnPrestige.onclick = prestige;

    gameState.stages.forEach((stage, index) => {
        const card = document.createElement('div');
        card.className = `stage-card ${stage.qty === 0 && index !== 0 ? 'locked-stage' : ''}`;
        card.innerHTML = `
            <div class="stage-header">
                <div class="stage-title">
                    ${stage.name} <span class="stage-qty">Lvl <span class="dom-qty">0</span></span>
                </div>
                <div class="stage-revenue dom-rev">$0</div>
            </div>
            <div class="progress-container dom-run-area">
                <div class="progress-fill dom-fill"></div>
                <div class="progress-overlay-text dom-time">0.0s</div>
            </div>
            <div class="stage-controls">
                <button class="btn-action dom-buy">
                    Upgrade <br><span class="cost dom-cost">$0</span>
                </button>
                <button class="btn-action btn-manager dom-hire">
                    Hire Manager <br><span class="cost dom-mcost">$0</span>
                </button>
            </div>
        `;
        container.appendChild(card);

        // Cache references
        const domRef = {
            card: card,
            qty: card.querySelector('.dom-qty'),
            rev: card.querySelector('.dom-rev'),
            fill: card.querySelector('.dom-fill'),
            time: card.querySelector('.dom-time'),
            buyBtn: card.querySelector('.dom-buy'),
            cost: card.querySelector('.dom-cost'),
            hireBtn: card.querySelector('.dom-hire'),
            mCost: card.querySelector('.dom-mcost'),
            runArea: card.querySelector('.dom-run-area')
        };
        DOM.stages.push(domRef);

        // Bind Events - direct DOM attachment prevents pass-through
        domRef.runArea.addEventListener('click', () => {
            if (stage.qty > 0 && !stage.isRunning) {
                stage.isRunning = true;
                saveGame();
            }
        });

        domRef.buyBtn.addEventListener('click', () => {
            const cost = MathEngine.getCost(stage.baseCost, stage.qty);
            if (gameState.money >= cost) {
                gameState.money -= cost;
                stage.qty++;
                // Unlock next stage visually
                if (index + 1 < gameState.stages.length) {
                    DOM.stages[index + 1].card.classList.remove('locked-stage');
                }
                saveGame();
            }
        });

        domRef.hireBtn.addEventListener('click', () => {
            if (gameState.money >= stage.managerCost && !stage.isManagerHired && stage.qty > 0) {
                gameState.money -= stage.managerCost;
                stage.isManagerHired = true;
                if(!stage.isRunning) stage.isRunning = true;
                saveGame();
            }
        });
    });
};

// UI Rendering (Frame-safe)
const render = () => {
    // Header
    DOM.uiMoney.textContent = formatMoney(gameState.money);
    DOM.uiBricks.textContent = formatter.format(gameState.bricks);
    DOM.uiBonus.textContent = (gameState.bricks * 2);
    
    const bricksToClaim = MathEngine.getBricksToClaim();
    DOM.uiPrestigeGain.textContent = formatter.format(bricksToClaim);
    DOM.btnPrestige.disabled = bricksToClaim <= 0;

    // Stages
    gameState.stages.forEach((stage, index) => {
        const ref = DOM.stages[index];
        const cost = MathEngine.getCost(stage.baseCost, stage.qty);
        const rev = MathEngine.getRevenue(stage);

        // Text updates
        ref.qty.textContent = stage.qty;
        ref.rev.textContent = `+${formatMoney(rev)}`;
        ref.cost.textContent = formatMoney(cost);
        
        // Progress bar
        const pct = stage.isRunning ? (stage.progress / stage.duration) * 100 : 0;
        ref.fill.style.width = `${pct}%`;
        const timeLeft = stage.isRunning ? ((stage.duration - stage.progress) / 1000).toFixed(1) : (stage.duration/1000).toFixed(1);
        ref.time.textContent = `${timeLeft}s`;

        // Button States
        ref.buyBtn.disabled = gameState.money < cost || (index > 0 && gameState.stages[index-1].qty === 0);
        
        if (stage.isManagerHired) {
            ref.hireBtn.style.display = 'none';
        } else {
            ref.mCost.textContent = formatMoney(stage.managerCost);
            ref.hireBtn.disabled = gameState.money < stage.managerCost || stage.qty === 0;
        }

        // Visual Unlock logic (in case loaded from save)
        if (stage.qty > 0 || (index === 0) || (index > 0 && gameState.stages[index-1].qty > 0)) {
            ref.card.classList.remove('locked-stage');
        }
    });
};

// Logic Update (Frame-safe)
const update = (dt) => {
    let stateChanged = false;
    
    gameState.stages.forEach(stage => {
        if (stage.isRunning) {
            stage.progress += dt;
            if (stage.progress >= stage.duration) {
                const rev = MathEngine.getRevenue(stage);
                gameState.money += rev;
                gameState.allTimeEarnings += rev;
                
                if (stage.isManagerHired) {
                    stage.progress = stage.progress % stage.duration; // Loop it cleanly
                } else {
                    stage.progress = 0;
                    stage.isRunning = false;
                }
                stateChanged = true;
            }
        }
    });

    if (stateChanged) saveGame();
};

// Main Game Loop
const loop = (time) => {
    const dt = time - lastFrameTime;
    lastFrameTime = time;
    
    // Cap dt to prevent massive jumps on tab switch (use offline progress logic for long away times)
    const safeDt = Math.min(dt, 100); 
    
    update(safeDt);
    render();
    
    requestAnimationFrame(loop);
};

// Toast notification for offline earnings
const showOfflineToast = (amount) => {
    const toast = document.getElementById('offline-toast');
    document.getElementById('offline-amount').textContent = formatMoney(amount);
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 5000);
};

// Boot
window.onload = () => {
    loadGame();
    initDOM();
    lastFrameTime = performance.now();
    requestAnimationFrame(loop);
};

</script>
</body>
</html>
