<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construction Tycoon</title>
    <style>
        :root {
            --bg-primary: #1e222b;
            --bg-secondary: #282c34;
            --accent-orange: #ff9800;
            --accent-yellow: #ffeb3b;
            --text-light: #f5f5f5;
            --text-muted: #b0bec5;
            --progress-bg: #37474f;
            --success-green: #4caf50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--bg-secondary);
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid var(--accent-orange);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        header h1 {
            font-size: 24px;
            color: var(--accent-yellow);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        #corporate-funds {
            font-size: 32px;
            font-weight: bold;
            color: var(--success-green);
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 250px;
            background-color: var(--bg-secondary);
            border-right: 2px solid #37474f;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
        }

        .tab-btn {
            background-color: var(--bg-primary);
            color: var(--text-light);
            border: 2px solid var(--progress-bg);
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            border-color: var(--accent-orange);
            background-color: var(--accent-orange);
            color: #000;
        }

        .content-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .panel {
            display: none;
            flex-direction: column;
            gap: 15px;
        }

        .panel.active {
            display: flex;
        }

        /* Project Card Styling */
        .project-card {
            background-color: var(--bg-secondary);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            position: relative;
        }

        .project-icon-click {
            width: 80px;
            height: 80px;
            background-color: var(--accent-orange);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 4px solid var(--accent-yellow);
            position: relative;
        }

        .project-icon-click:active {
            transform: scale(0.95);
        }

        .project-count {
            position: absolute;
            bottom: -5px;
            background: #000;
            color: #fff;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
        }

        .project-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 16px;
        }

        .project-revenue {
            color: var(--success-green);
        }

        .progress-bar-container {
            width: 100%;
            height: 24px;
            background-color: var(--progress-bg);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-orange), var(--accent-yellow));
            transition: width linear;
        }

        .progress-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 2px;
            font-size: 13px;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
        }

        .buy-button {
            width: 140px;
            height: 50px;
            background-color: var(--success-green);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            box-shadow: 0 4px 0 #2e7d32;
        }

        .buy-button:hidden {
            display: none;
        }

        .buy-button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #2e7d32;
        }

        .buy-button:disabled {
            background-color: #555;
            box-shadow: 0 4px 0 #333;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Upgrades & Managers Grid */
        .store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .store-item {
            background-color: var(--bg-secondary);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 10px;
            border-left: 5px solid var(--accent-orange);
        }

        .store-item h3 {
            font-size: 16px;
            color: var(--accent-yellow);
        }

        .store-item p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .store-btn {
            background-color: var(--accent-orange);
            color: #000;
            border: none;
            padding: 8px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        .store-btn:disabled {
            background-color: #555;
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .store-btn:not(:disabled):hover {
            background-color: var(--accent-yellow);
        }

        /* Utility buttons layout */
        .utils {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .util-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
            text-align: left;
            padding: 5px;
        }

        .util-btn:hover {
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <h1>Construction Tycoon</h1>
        <div id="corporate-funds">$0.00</div>
    </header>

    <div class="main-container">
        <div class="sidebar">
            <button class="tab-btn active" onclick="switchTab('projects')">Projects</button>
            <button class="tab-btn" onclick="switchTab('upgrades')">Upgrades</button>
            <button class="tab-btn" onclick="switchTab('managers')">Managers</button>
            
            <div class="utils">
                <button class="util-btn" onclick="resetGame()">Hard Reset Game</button>
            </div>
        </div>

        <div class="content-area">
            <!-- Projects Panel -->
            <div id="projects-panel" class="panel active"></div>

            <!-- Upgrades Panel -->
            <div id="upgrades-panel" class="panel">
                <h2>Corporate Upgrades</h2>
                <div class="store-grid" id="upgrades-grid"></div>
            </div>

            <!-- Managers Panel -->
            <div id="managers-panel" class="panel">
                <h2>Subcontractors & Managers</h2>
                <div class="store-grid" id="managers-grid"></div>
            </div>
        </div>
    </div>

    <script>
        // Game State configuration
        let gameState = {
            money: 0,
            lastSave: Date.now(),
            projects: {
                pothole: { count: 1, automated: false, progress: 0, active: false },
                housing: { count: 0, automated: false, progress: 0, active: false },
                commercial: { count: 0, automated: false, progress: 0, active: false },
                highway: { count: 0, automated: false, progress: 0, active: false },
                skyscraper: { count: 0, automated: false, progress: 0, active: false }
            },
            upgrades: {},
            managers: {}
        };

        // Static Game Balance Data
        const projectData = {
            pothole: { id: 'pothole', name: 'Sidewalk Patching', baseCost: 4, costMultiplier: 1.07, baseRevenue: 1, duration: 600 },
            housing: { id: 'housing', name: 'Residential Framing', baseCost: 60, costMultiplier: 1.15, baseRevenue: 60, duration: 3000 },
            commercial: { id: 'commercial', name: 'Shopping Malls', baseCost: 720, costMultiplier: 1.14, baseRevenue: 540, duration: 6000 },
            highway: { id: 'highway', name: 'Highway Expansion', baseCost: 8640, costMultiplier: 1.13, baseRevenue: 4320, duration: 12000 },
            skyscraper: { id: 'skyscraper', name: 'Skyscraper Project', baseCost: 103680, costMultiplier: 1.12, baseRevenue: 51840, duration: 24000 }
        };

        const upgradeData = [
            { id: 'up_pot_1', target: 'pothole', name: 'Premium Asphalt Mix', cost: 250, multiplier: 3, description: 'Sidewalk Patching profits x3' },
            { id: 'up_hou_1', target: 'housing', name: 'Pneumatic Nail Guns', cost: 500, multiplier: 3, description: 'Residential Framing profits x3' },
            { id: 'up_com_1', target: 'commercial', name: 'Pre-cast Concrete Blocks', cost: 1000, multiplier: 3, description: 'Shopping Malls profits x3' },
            { id: 'up_all_1', target: 'all', name: 'Tax Write-offs', cost: 5000, multiplier: 2, description: 'All project profits x2' }
        ];

        const managerData = [
            { id: 'mgr_pothole', target: 'pothole', name: 'Concrete Foreperson', cost: 1000, description: 'Automates Sidewalk Patching' },
            { id: 'mgr_housing', target: 'housing', name: 'Residential Superintendent', cost: 15000, description: 'Automates Residential Framing' },
            { id: 'mgr_commercial', target: 'commercial', name: 'Commercial Project Mgr', cost: 100000, description: 'Automates Shopping Malls' },
            { id: 'mgr_highway', target: 'highway', name: 'Civil Engineer Lead', cost: 500000, description: 'Automates Highway Expansion' },
            { id: 'mgr_skyscraper', target: 'skyscraper', name: 'Chief Operations Officer', cost: 1200000, description: 'Automates Skyscrapers' }
        ];

        // Format Currency Helper
        function formatMoney(value) {
            return '$' + value.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // Get current dynamic upgrade multiplier for a project
        function getProjectMultiplier(projectId) {
            let mult = 1;
            upgradeData.forEach(up => {
                if (gameState.upgrades[up.id] && (up.target === projectId || up.target === 'all')) {
                    mult *= up.multiplier;
                }
            });
            return mult;
        }

        // Calculation Helpers
        function getProjectCost(id) {
            const p = projectData[id];
            const count = gameState.projects[id].count;
            return Math.round(p.baseCost * Math.pow(p.costMultiplier, count));
        }

        function getProjectRevenue(id) {
            const p = projectData[id];
            const count = gameState.projects[id].count;
            return p.baseRevenue * count * getProjectMultiplier(id);
        }

        // UI Initialization
        function initUI() {
            // Render Projects
            const panel = document.getElementById('projects-panel');
            panel.innerHTML = '';
            
            Object.keys(projectData).forEach(id => {
                const data = projectData[id];
                const card = document.createElement('div');
                card.className = 'project-card';
                card.id = `card-${id}`;
                card.innerHTML = `
                    <div class="project-icon-click" onclick="startProject('${id}')">
                        <span style="font-size:24px;">🏗️</span>
                        <div class="project-count" id="count-${id}">0</div>
                    </div>
                    <div class="project-details">
                        <div class="project-header">
                            <span>${data.name}</span>
                            <span class="project-revenue" id="revenue-${id}">$0.00</span>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-fill" id="progress-${id}"></div>
                            <div class="progress-text" id="timer-${id}">0.0s</div>
                        </div>
                    </div>
                    <button class="buy-button" id="buy-${id}" onclick="buyProject('${id}')">
                        <span>Buy +1</span>
                        <span id="cost-${id}" style="font-size:11px;">$0.00</span>
                    </button>
                `;
                panel.appendChild(card);
            });

            // Render Upgrades
            const upGrid = document.getElementById('upgrades-grid');
            upGrid.innerHTML = '';
            upgradeData.forEach(up => {
                const item = document.createElement('div');
                item.className = 'store-item';
                item.id = `store-up-${up.id}`;
                item.innerHTML = `
                    <div>
                        <h3>${up.name}</h3>
                        <p>${up.description}</p>
                    </div>
                    <button class="store-btn" id="btn-up-${up.id}" onclick="buyUpgrade('${up.id}')">Buy: ${formatMoney(up.cost)}</button>
                `;
                upGrid.appendChild(item);
            });

            // Render Managers
            const mgrGrid = document.getElementById('managers-grid');
            mgrGrid.innerHTML = '';
            managerData.forEach(mgr => {
                const item = document.createElement('div');
                item.className = 'store-item';
                item.id = `store-mgr-${mgr.id}`;
                item.innerHTML = `
                    <div>
                        <h3>${mgr.name}</h3>
                        <p>${mgr.description}</p>
                    </div>
                    <button class="store-btn" id="btn-mgr-${mgr.id}" onclick="buyManager('${mgr.id}')">Hire: ${formatMoney(mgr.cost)}</button>
                `;
                mgrGrid.appendChild(item);
            });
        }

        // Interface Navigation Tabs
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`${tabId}-panel`).classList.add('active');
        }

        // Core Game Loops & Actions
        function startProject(id) {
            let state = gameState.projects[id];
            if (state.count > 0 && !state.active) {
                state.active = true;
                state.progress = 0;
            }
        }

        function buyProject(id) {
            let cost = getProjectCost(id);
            if (gameState.money >= cost) {
                gameState.money -= cost;
                gameState.projects[id].count++;
                updateUI();
                saveGame();
            }
        }

        function buyUpgrade(id) {
            const up = upgradeData.find(u => u.id === id);
            if (gameState.money >= up.cost && !gameState.upgrades[id]) {
                gameState.money -= up.cost;
                gameState.upgrades[id] = true;
                updateUI();
                saveGame();
            }
        }

        function buyManager(id) {
            const mgr = managerData.find(m => m.id === id);
            if (gameState.money >= mgr.cost && !gameState.managers[id]) {
                gameState.money -= mgr.cost;
                gameState.managers[id] = true;
                gameState.projects[mgr.target].automated = true;
                updateUI();
                saveGame();
            }
        }

        // Main Refresh Loop UI updates
        function updateUI() {
            document.getElementById('corporate-funds').innerText = formatMoney(gameState.money);

            Object.keys(projectData).forEach(id => {
                const pState = gameState.projects[id];
                const cost = getProjectCost(id);
                
                document.getElementById(`count-${id}`).innerText = pState.count;
                document.getElementById(`revenue-${id}`).innerText = formatMoney(getProjectRevenue(id));
                document.getElementById(`cost-${id}`).innerText = formatMoney(cost);
                
                const buyBtn = document.getElementById(`buy-${id}`);
                buyBtn.disabled = gameState.money < cost;

                // Hide project layout card if user hasn't unlocked it yet
                const card = document.getElementById(`card-${id}`);
                if (pState.count === 0 && id !== 'pothole') {
                    buyBtn.style.width = "100%";
                    card.querySelector('.project-icon-click').style.opacity = '0.4';
                } else {
                    buyBtn.style.width = "140px";
                    card.querySelector('.project-icon-click').style.opacity = '1';
                }
            });

            // Toggle shop item state structures
            upgradeData.forEach(up => {
                const btn = document.getElementById(`btn-up-${up.id}`);
                if (gameState.upgrades[up.id]) {
                    btn.innerText = "Acquired";
                    btn.disabled = true;
                } else {
                    btn.disabled = gameState.money < up.cost;
                }
            });

            managerData.forEach(mgr => {
                const btn = document.getElementById(`btn-mgr-${mgr.id}`);
                if (gameState.managers[mgr.id]) {
                    btn.innerText = "Hired";
                    btn.disabled = true;
                } else {
                    btn.disabled = gameState.money < mgr.cost;
                }
            });
        }

        // Clock Ticks processing engine updates
        let lastTime = performance.now();
        function gameTick(time) {
            let delta = time - lastTime;
            lastTime = time;

            Object.keys(projectData).forEach(id => {
                let state = gameState.projects[id];
                let data = projectData[id];

                if (state.count > 0 && s
