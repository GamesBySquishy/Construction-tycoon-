<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Business Tycoon</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #header { position: sticky; top: 0; background: #1e293b; width: 100%; padding: 1rem; text-align: center; border-bottom: 2px solid #334155; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1rem; padding: 1rem; width: 100%; max-width: 1200px; }
        .asset-card { background: #1e293b; padding: 1rem; border-radius: 8px; border: 1px solid #334155; }
        .progress-bar { height: 20px; background: #0f172a; border-radius: 10px; overflow: hidden; margin: 10px 0; border: 1px solid #475569; }
        .fill { height: 100%; background: #22c55e; width: 0%; transition: width 0.1s linear; }
        button { cursor: pointer; width: 100%; margin-top: 5px; padding: 10px; border: none; border-radius: 4px; font-weight: bold; }
        .buy-btn { background: #3b82f6; color: white; }
        .manage-btn { background: #a855f7; color: white; }
    </style>
</head>
<body>

<div id="header">
    <h1>Money: <span id="money">0</span></h1>
    <div>Multiplier: <span id="mult">100</span>% | Total Capital: <span id="capital">0</span></div>
</div>

<div class="container" id="game-grid"></div>

<script>
    const config = [
        { name: "Lemonade Stand", baseCost: 4, baseRev: 1, duration: 600, qty: 0, managerCost: 1000 },
        { name: "Newspaper Route", baseCost: 60, baseRev: 20, duration: 3000, qty: 0, managerCost: 15000 },
        { name: "Car Wash", baseCost: 720, baseRev: 120, duration: 6000, qty: 0, managerCost: 100000 },
        { name: "Pizza Parlor", baseCost: 8640, baseRev: 800, duration: 12000, qty: 0, managerCost: 500000 }
    ];

    let state = { money: 10, capital: 0, assets: config.map(a => ({ ...a, progress: 0, managed: false })) };

    function render() {
        const grid = document.getElementById('game-grid');
        grid.innerHTML = '';
        state.assets.forEach((a, i) => {
            const cost = Math.floor(a.baseCost * Math.pow(1.15, a.qty));
            const card = document.createElement('div');
            card.className = 'asset-card';
            card.innerHTML = `
                <h3>${a.name} (Lvl ${a.qty})</h3>
                <div class="progress-bar"><div class="fill" style="width:${(a.progress/a.duration)*100}%"></div></div>
                <button class="buy-btn" onclick="buy(${i})">Buy ($${cost})</button>
                <button class="manage-btn" ${a.managed ? 'disabled' : ''} onclick="hire(${i})">
                    ${a.managed ? 'Managed' : 'Hire Manager ($' + a.managerCost + ')'}
                </button>
            `;
            grid.appendChild(card);
        });
        document.getElementById('money').innerText = Math.floor(state.money).toLocaleString();
    }

    function buy(i) {
        const a = state.assets[i];
        const cost = Math.floor(a.baseCost * Math.pow(1.15, a.qty));
        if (state.money >= cost) { state.money -= cost; a.qty++; render(); }
    }

    function hire(i) {
        const a = state.assets[i];
        if (state.money >= a.managerCost) { state.money -= a.managerCost; a.managed = true; render(); }
    }

    function update(dt) {
        state.assets.forEach(a => {
            if (a.qty > 0 && (a.managed || a.progress > 0)) {
                a.progress += dt;
                if (a.progress >= a.duration) {
                    state.money += (a.baseRev * a.qty);
                    a.progress = 0;
                    if (!a.managed) a.progress = -1; // Stops auto-run if no manager
                }
            }
        });
        render();
    }

    setInterval(() => update(100), 100);
</script>
</body>
</html>
