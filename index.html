<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Business Tycoon</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #header { position: sticky; top: 0; background: #1e293b; width: 100%; padding: 1.5rem; text-align: center; border-bottom: 2px solid #334155; z-index: 10; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; padding: 1.5rem; width: 100%; max-width: 1000px; }
        .asset-card { background: #1e293b; padding: 1.5rem; border-radius: 12px; border: 1px solid #334155; }
        .progress-bar { height: 24px; background: #000; border-radius: 12px; overflow: hidden; margin: 15px 0; border: 1px solid #475569; position: relative; }
        .fill { height: 100%; background: #22c55e; width: 0%; }
        button { cursor: pointer; width: 100%; margin-top: 10px; padding: 12px; border: none; border-radius: 6px; font-weight: bold; }
        .buy-btn { background: #3b82f6; color: white; }
        .manage-btn { background: #a855f7; color: white; }
        button:disabled { background: #475569; cursor: not-allowed; }
    </style>
</head>
<body>

<div id="header">
    <h1>$ <span id="money">0</span></h1>
</div>

<div class="container" id="game-grid"></div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const config = [
            { name: "Lemonade Stand", baseCost: 4, baseRev: 1, duration: 1000, qty: 0, managerCost: 1000 },
            { name: "Newspaper Route", baseCost: 60, baseRev: 20, duration: 3000, qty: 0, managerCost: 15000 },
            { name: "Car Wash", baseCost: 720, baseRev: 120, duration: 6000, qty: 0, managerCost: 100000 }
        ];

        let state = { money: 10, assets: config.map(a => ({ ...a, progress: 0, managed: false })) };

        function updateUI() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            document.getElementById('money').innerText = Math.floor(state.money).toLocaleString();

            state.assets.forEach((a, i) => {
                const cost = Math.floor(a.baseCost * Math.pow(1.15, a.qty));
                const card = document.createElement('div');
                card.className = 'asset-card';
                card.innerHTML = `
                    <h3>${a.name} (Lvl ${a.qty})</h3>
                    <div class="progress-bar"><div class="fill" style="width:${(a.progress/a.duration)*100}%"></div></div>
                    <button class="buy-btn" onclick="buy(${i})">Buy ($${cost.toLocaleString()})</button>
                    <button class="manage-btn" ${a.managed ? 'disabled' : ''} onclick="hire(${i})">
                        ${a.managed ? 'Manager Hired' : 'Hire Manager ($' + a.managerCost.toLocaleString() + ')'}
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        window.buy = (i) => {
            const a = state.assets[i];
            const cost = Math.floor(a.baseCost * Math.pow(1.15, a.qty));
            if (state.money >= cost) { state.money -= cost; a.qty++; updateUI(); }
        };

        window.hire = (i) => {
            const a = state.assets[i];
            if (state.money >= a.managerCost) { state.money -= a.managerCost; a.managed = true; updateUI(); }
        };

        setInterval(() => {
            state.assets.forEach(a => {
                if (a.qty > 0 && (a.managed || a.progress > 0)) {
                    a.progress += 100;
                    if (a.progress >= a.duration) {
                        state.money += (a.baseRev * a.qty);
                        a.progress = 0;
                        if (!a.managed) a.progress = -1; 
                    }
                }
            });
            updateUI();
        }, 100);
    });
</script>
</body>
</html>
